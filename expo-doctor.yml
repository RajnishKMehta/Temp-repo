name: Expo Doctor🩺

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: expo-doctor-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  expo-doctor:
    name: Expo Doctor Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ⬢ Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 🗄️ Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: ♻️ Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: 📂 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🩺 Run expo-doctor
        id: doctor
        shell: bash
        run: |
          set +e
          RAW=$(pnpm dlx expo-doctor@latest 2>&1)
          EXIT=$?
          echo "$RAW"
          {
            echo "raw<<EOF_DOCTOR"
            echo "$RAW"
            echo "EOF_DOCTOR"
            echo "exit_code=$EXIT"
          } >> "$GITHUB_OUTPUT"
          exit $EXIT

      - name: 💬 Comment failure on PR
        if: failure() && steps.doctor.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const raw = `${{ steps.doctor.outputs.raw }}`;

            const issueLines = raw
              .split('\n')
              .filter(line => /✖|✗|✘|×|\[FAIL\]|error|warning|fix|issue|incompatible|mismatch|invalid|missing/i.test(line))
              .map(line => `- ${line.trim()}`)
              .join('\n');

            const body = [
              '## 🩺 Expo Doctor — Issues Found',
              '',
              '> This PR has **expo-doctor** check failures. Fix these before merging.',
              '',
              '### ❌ Issues',
              issueLines || '_Could not extract specific issues — see full output below._',
              '',
              '<details>',
              '<summary>📋 Full expo-doctor output</summary>',
              '',
              '```',
              raw,
              '```',
              '',
              '</details>',
              '',
              `_Triggered by commit \`${{ github.event.pull_request.head.sha }}\`_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('🩺 Expo Doctor')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: ✅ Comment success on PR
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('🩺 Expo Doctor')
            );

            const body = [
              '## 🩺 Expo Doctor — All Checks Passed ✅',
              '',
              '> No issues found by expo-doctor.',
              '',
              `_Triggered by commit \`${{ github.event.pull_request.head.sha }}\`_`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
